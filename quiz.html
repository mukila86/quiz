<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data and Internet Security Quiz</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    max-width: 650px;
    width: 100%;
    padding: 24px 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  h1 {
    text-align: center;
    color: #203a43;
    margin-top: 0;
    font-size: 24px;
  }
  p.subtitle {
    text-align: center;
    color: #666;
    margin-top: -6px;
    margin-bottom: 24px;
    font-size: 14px;
  }
  label {
    display: block;
    font-weight: 600;
    margin: 14px 0 6px;
    color: #203a43;
    font-size: 14px;
  }
  input[type="text"], input[type="email"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
  }
  input:focus { outline: none; border-color: #2c5364; }
  .btn {
    display: inline-block;
    margin-top: 24px;
    background: #2c5364;
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover { background: #203a43; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .question-block {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid #eee;
  }
  .q-text {
    font-weight: 600;
    color: #203a43;
    margin-bottom: 10px;
    font-size: 15px;
  }
  .option {
    display: block;
    margin: 6px 0;
    padding: 12px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid transparent;
  }
  .option:hover { background: #f2f6f8; }
  .option input { margin-right: 8px; }
  .progress {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .hidden { display: none; }
  .result-score {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #2c5364;
    margin: 10px 0;
  }
  .result-sub {
    text-align: center;
    color: #555;
    margin-bottom: 20px;
  }
  .review-item {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13.5px;
  }
  .correct { background: #e6f7ec; border: 1px solid #b8e6c8; }
  .wrong { background: #fdecec; border: 1px solid #f3bcbc; }
  .unanswered { background: #fff6e0; border: 1px solid #ffe4a3; }
  .review-ans { margin-top: 4px; color: #444; }

  @media (max-width: 480px) {
    .card { padding: 18px 14px; border-radius: 10px; }
    h1 { font-size: 20px; }
    .result-score { font-size: 34px; }
    .btn { padding: 13px 20px; font-size: 16px; }
    .q-text { font-size: 14px; }
    .option { font-size: 13.5px; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- FRONT PAGE -->
  <div id="frontPage">
    <h1>🔐 Data and Internet Security Quiz</h1>
    <p class="subtitle">Please fill your details to begin the quiz (20 questions)</p>

    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email ID</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="cls">Class</label>
    <input type="text" id="cls" placeholder="Enter as Class/Section, e.g. 10/A">

    <div id="frontWarning" style="display:none;color:#b30000;background:#fdecec;border:1px solid #f3bcbc;padding:8px 12px;border-radius:8px;margin-top:14px;font-size:13.5px;"></div>
    <button class="btn" id="startBtn" type="button">Start Quiz</button>
  </div>

  <!-- QUIZ PAGE -->
  <div id="quizPage" class="hidden">
    <h1>Data and Internet Security Quiz</h1>
    <div class="progress" id="progress"></div>
    <form id="quizForm"></form>
    <div id="quizWarning" style="display:none;color:#b30000;background:#fdecec;border:1px solid #f3bcbc;padding:8px 12px;border-radius:8px;margin-bottom:14px;font-size:13.5px;"></div>
    <button class="btn" id="submitBtn" type="button">Submit Quiz</button>
  </div>

  <!-- RESULT PAGE -->
  <div id="resultPage" class="hidden">
    <h1>Quiz Result</h1>
    <div class="result-score" id="scoreText"></div>
    <div class="result-sub" id="scoreSub"></div>
    <div id="reviewList"></div>
  </div>

</div>

<script>
const questions = [
  {q:"What is the primary goal of Information Security?", options:["Entertainment","Confidentiality, Integrity, Availability","Networking","Programming"], correct:1},
  {q:"CIA stands for:", options:["Central Internet Access","Confidentiality, Integrity, Availability","Computer Information Access","Central Intelligence Application"], correct:1},
  {q:"Which attack attempts to make a service unavailable?", options:["Phishing","SQL Injection","DoS Attack","Password Attack"], correct:2},
  {q:"Which of the following is a symmetric key algorithm?", options:["RSA","ECC","AES","DSA"], correct:2},
  {q:"Which algorithm is an asymmetric encryption algorithm?", options:["AES","DES","RSA","Blowfish"], correct:2},
  {q:"SSL/TLS is mainly used for:", options:["File Compression","Secure Communication","Database Management","Image Processing"], correct:1},
  {q:"Which protocol is used for secure web browsing?", options:["HTTP","FTP","HTTPS","SMTP"], correct:2},
  {q:"Which of the following is malware?", options:["Firewall","Antivirus","Trojan Horse","VPN"], correct:2},
  {q:"A firewall is used to:", options:["Increase RAM","Protect a network from unauthorized access","Store passwords","Speed up CPU"], correct:1},
  {q:"Which attack tricks users into revealing personal information?", options:["Phishing","DoS","Brute Force","Sniffing"], correct:0},
  {q:"Which function is used to verify data integrity?", options:["Encryption","Hash Function","Compression","Encoding"], correct:1},
  {q:"Which hashing algorithm is considered more secure?", options:["MD5","SHA-256","CRC","DES"], correct:1},
  {q:"Digital Signature provides:", options:["Authentication","Data Compression","File Sharing","Video Streaming"], correct:0},
  {q:"VPN stands for:", options:["Virtual Private Network","Virtual Public Network","Visual Private Node","Verified Public Network"], correct:0},
  {q:"Which protocol is commonly used for secure remote login?", options:["Telnet","FTP","SSH","HTTP"], correct:2},
  {q:"Which of the following is NOT a type of malware?", options:["Worm","Virus","Trojan","Router"], correct:3},
  {q:"Which attack tries all possible passwords?", options:["Dictionary Attack","Brute Force Attack","Phishing","Sniffing"], correct:1},
  {q:"Which layer of the OSI model does SSL/TLS operate with?", options:["Application Layer","Transport Layer","Data Link Layer","Physical Layer"], correct:1},
  {q:"Which security principle ensures data is not modified by unauthorized users?", options:["Confidentiality","Integrity","Availability","Authentication"], correct:1},
  {q:"Which device monitors and filters incoming and outgoing network traffic?", options:["Modem","Switch","Firewall","Hub"], correct:2}
];

let userInfo = {};
let userAnswers = new Array(questions.length).fill(null);

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('submitBtn').addEventListener('click', submitQuiz);

function startQuiz() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const cls = document.getElementById('cls').value.trim();

  const warning = document.getElementById('frontWarning');

  const namePattern = /^[A-Za-z ]{2,40}$/;
  const emailPattern = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
  const classPattern = /^[A-Za-z0-9]+\/[A-Za-z0-9]+$/;

  if (!name) {
    warning.innerText = "Please enter your name.";
    warning.style.display = 'block';
    return;
  }
  if (!namePattern.test(name)) {
    warning.innerText = "Please enter a valid name (letters only, no numbers or symbols).";
    warning.style.display = 'block';
    return;
  }
  if (!email) {
    warning.innerText = "Please enter your email id.";
    warning.style.display = 'block';
    return;
  }
  if (/^[A-Z]/.test(email)) {
    warning.innerText = "Email id should not start with a capital letter.";
    warning.style.display = 'block';
    return;
  }
  if (!emailPattern.test(email)) {
    warning.innerText = "Please enter a valid email id (example: name@gmail.com).";
    warning.style.display = 'block';
    return;
  }
  if (!cls) {
    warning.innerText = "Please enter your class / section.";
    warning.style.display = 'block';
    return;
  }
  if (!classPattern.test(cls)) {
    warning.innerText = "Please enter Class/Section in the format Class/Section (example: 10/A). Section is compulsory.";
    warning.style.display = 'block';
    return;
  }

  warning.style.display = 'none';
  userInfo = { name, email, cls };

  document.getElementById('frontPage').classList.add('hidden');
  document.getElementById('quizPage').classList.remove('hidden');
  document.getElementById('progress').innerText = `${questions.length} Questions • Answer all and submit`;

  renderQuiz();
}

function renderQuiz() {
  const form = document.getElementById('quizForm');
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const block = document.createElement('div');
    block.className = 'question-block';

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.innerText = `${qi + 1}. ${item.q}`;
    block.appendChild(qText);

    item.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      label.innerHTML = `<input type="radio" name="q${qi}" value="${oi}"> ${String.fromCharCode(65+oi)}) ${opt}`;
      label.querySelector('input').addEventListener('change', () => {
        userAnswers[qi] = oi;
      });
      block.appendChild(label);
    });

    form.appendChild(block);
  });
}

let submitConfirmPending = false;

function submitQuiz() {
  const warning = document.getElementById('quizWarning');
  const unanswered = userAnswers.filter(a => a === null).length;

  if (unanswered > 0 && !submitConfirmPending) {
    warning.innerText = `You have ${unanswered} unanswered question(s). Click "Submit Quiz" again to submit anyway.`;
    warning.style.display = 'block';
    submitConfirmPending = true;
    return;
  }

  warning.style.display = 'none';
  submitConfirmPending = false;

  let score = 0;
  questions.forEach((item, qi) => {
    if (userAnswers[qi] === item.correct) score++;
  });

  document.getElementById('quizPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');

  document.getElementById('scoreText').innerText = `${score} / ${questions.length}`;
  document.getElementById('scoreSub').innerText =
    `${userInfo.name} (${userInfo.email}, Class: ${userInfo.cls}) — ${Math.round((score/questions.length)*100)}%`;

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    const userAns = userAnswers[qi];
    let cls = 'unanswered';
    let ansText = 'Not answered';
    if (userAns !== null) {
      cls = userAns === item.correct ? 'correct' : 'wrong';
      ansText = `Your answer: ${String.fromCharCode(65+userAns)}) ${item.options[userAns]}`;
    }
    div.className = 'review-item ' + cls;
    div.innerHTML = `<div>${qi+1}. ${item.q}</div>
      <div class="review-ans">${ansText}<br>Correct answer: ${String.fromCharCode(65+item.correct)}) ${item.options[item.correct]}</div>`;
    reviewList.appendChild(div);
  });
}
</script>

</body>
</html>
